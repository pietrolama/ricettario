<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ricettario</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Ripristino tema prima del render per evitare flash -->
    <script>
      (function () {
        const t = localStorage.getItem('ricettario-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body>
    <!-- Header -->
    <header>
      <button class="menu-toggle" id="menuToggle" aria-label="Apri menu" aria-expanded="false">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      <div class="header-brand">
        <h1>Ricettario</h1>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Cambia tema">
          <!-- Moon: visibile in light mode -->
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <!-- Sun: visibile in dark mode -->
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <span id="recipe-counter" class="recipe-count-display">Caricamento...</span>
      </div>
    </header>

    <!-- Main Container (Sidebar + Content) -->
    <div class="main-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-search">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Cerca ricette…" />
          </div>
          <nav class="sidebar-nav">
            <p class="sidebar-nav-label">Sezioni</p>
            <ul id="categoryList"></ul>
          </nav>
        </div>
      </aside>

      <!-- Content Area -->
      <section class="content">
        <div id="gallery" class="gallery hidden"></div>
        <div id="allRecipesContainer" class="hidden"></div>
        <div id="singleSezioneContainer" class="hidden"></div>
        <div id="sectionIntro" class="section-intro hidden"></div>
        <section id="sezioniContainer" class="sezioni-wrapper"></section>
      </section>
    </div>

    <!-- Recipe Detail Modal (Full Screen) -->
    <div id="recipeModal" class="modal">
      <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="menuOverlay" class="menu-overlay"></div>

    <script type="module" src="script/main.js"></script>
    <script>
      // Theme toggle
      document.getElementById('themeToggle').addEventListener('click', function () {
        const html = document.documentElement;
        const isDark = html.getAttribute('data-theme') === 'dark';
        if (isDark) {
          html.removeAttribute('data-theme');
          localStorage.setItem('ricettario-theme', 'light');
        } else {
          html.setAttribute('data-theme', 'dark');
          localStorage.setItem('ricettario-theme', 'dark');
        }
      });
    </script>
  </body>
</html>
